{% extends "base.html" %}
{% block content %}
{% include "kitesurf_styles.html" %}

<h2>Kitesurfing filtered forecast (1 week look-ahead)</h2>

<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
    <label for="location-select">Spot:</label>
    <select id="location-select">
        {% for loc in defaults.locations %}
            <option value="{{ loc }}" {% if loc == defaults.default_location %}selected{% endif %}>{{ loc }}</option>
        {% endfor %}
    </select>
</div>

<div id="forecast-table" style="margin-top:20px;"></div>

<h3 id="edit-title" style="margin-top:30px;">Edit forecast filters</h3>

<!-- ✅ Filters + Map container -->
<div class="filters-map-container">

    <!-- LEFT: Filters -->
    <div id="loc-edit" class="filters-panel">

        <label>Wind direction [from] (min, max):</label><br>
        <input id="wd-from" type="number" step="1">
        <input id="wd-to" type="number" step="1"><br><br>

        <label>Wind speed (min, max):</label><br>
        <input id="ws-from" type="number" step="0.1">
        <input id="ws-to" type="number" step="0.1"><br><br>

        <label>Tide type (high/low):</label><br>
        <select id="tide-type">
            <option value="high">High</option>
            <option value="low">Low</option>
        </select><br><br>

        <label>Tide window ± (hours):</label><br>
        <input id="tide-range" type="number" step="0.5"><br><br>

        <label>Gust limit max (above wind speed)</label><br>
        <input id="gust-limit" type="number" step="1"><br><br>

        <div style="display:flex; gap:10px;">
            <button id="reset-defaults"></button>
        </div>

        <div id="save-status" style="margin-top:10px; color:green;"></div>
    </div>

    <!-- RIGHT: Map -->
    <div id="wind-map" class="map-panel"></div>

</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<script>
// ------------------------
// Debounce helper
// ------------------------
function debounce(func, wait) {
    let timeout;
    return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
    };
}

// ------------------------
// Build forecast table
// ------------------------
function buildForecastTable(data) {
    let html = "<table border='1'><tr>";
    data.columns.forEach(col => html += `<th>${col}</th>`);
    html += "</tr>";
    data.rows.forEach(row => {
        html += "<tr>";
        row.forEach(cell => html += `<td>${cell}</td>`);
        html += "</tr>";
    });
    html += "</table>";
    document.getElementById("forecast-table").innerHTML = html;
}

// ------------------------
// Render wind map
// ------------------------
function renderWindMap(plotJson) {
    const fig = JSON.parse(plotJson);
    Plotly.react("wind-map", fig.data, fig.layout);
}

// ------------------------
// Update filter inputs
// ------------------------
function updateLocData(locData) {
    document.getElementById("wd-from").value = locData.wind_direction[0];
    document.getElementById("wd-to").value = locData.wind_direction[1];
    document.getElementById("ws-from").value = locData.wind_speed[0];
    document.getElementById("ws-to").value = locData.wind_speed[1];
    document.getElementById("tide-type").value = locData.tide_window[0];
    document.getElementById("tide-range").value = locData.tide_window[1];
    document.getElementById("gust-limit").value = locData.wind_gust_limit;
    document.getElementById("save-status").textContent = "";
}

// ------------------------
// Fetch forecast
// ------------------------
function fetchForecast(location, customData = null) {
    const payload = { form_data: { location } };
    if (customData) payload.form_data.custom_loc_data = customData;

    fetch("/kitesurf", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(data => {
        buildForecastTable(data);
        updateLocData(data.loc_data);
        renderWindMap(data.map_wind_dir_plot);

        document.getElementById("edit-title").textContent =
            `Applied forecast filters for ${location}`;
        document.getElementById("reset-defaults").textContent =
            `Reset to ${location} defaults`;
    });
}

// ------------------------
// Send filters
// ------------------------
let activeFetchController = null;

function sendFilters() {
    if (activeFetchController) activeFetchController.abort();

    const custom = {
        wind_direction: [
            Number(document.getElementById("wd-from").value),
            Number(document.getElementById("wd-to").value)
        ],
        wind_speed: [
            Number(document.getElementById("ws-from").value),
            Number(document.getElementById("ws-to").value)
        ],
        tide_window: [
            document.getElementById("tide-type").value,
            Number(document.getElementById("tide-range").value)
        ],
        wind_gust_limit: Number(document.getElementById("gust-limit").value)
    };

    const location = locationSelect.value;
    activeFetchController = new AbortController();

    fetch("/kitesurf", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ form_data: { location, custom_loc_data: custom } }),
        signal: activeFetchController.signal
    })
    .then(response => response.json())
    .then(data => {
        buildForecastTable(data);
        updateLocData(data.loc_data);
        renderWindMap(data.map_wind_dir_plot);

        document.getElementById("edit-title").textContent =
            `Applied forecast filters for ${location}`;
        document.getElementById("reset-defaults").textContent =
            `Reset to ${location} defaults`;
    })
    .catch(err => {
        if (err.name === "AbortError") return;
        console.error(err);
    });
}

// ------------------------
// Debounce
// ------------------------
const sendFiltersDebounced = debounce(sendFilters, 300);

// ------------------------
// Input events
// ------------------------
const filterInputs = [
    "wd-from", "wd-to",
    "ws-from", "ws-to",
    "tide-type", "tide-range",
    "gust-limit"
];

filterInputs.forEach(id => {
    const el = document.getElementById(id);

    if (el.tagName === "SELECT") {
        el.addEventListener("change", sendFiltersDebounced);
    } else {
        el.addEventListener("input", sendFiltersDebounced);
    }

    el.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            sendFilters();
        }
    });

    el.addEventListener("blur", sendFilters);
});

// ------------------------
// Location change
// ------------------------
const locationSelect = document.getElementById("location-select");
locationSelect.addEventListener("change", () => fetchForecast(locationSelect.value));

// ------------------------
// Reset defaults
// ------------------------
document.getElementById("reset-defaults").addEventListener("click", function () {
    fetch("/kitesurf", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            form_data: {
                location: locationSelect.value,
                reset_loc_data: true
            }
        })
    })
    .then(response => response.json())
    .then(data => {
        updateLocData(data.loc_data);
        fetchForecast(locationSelect.value);
        document.getElementById("save-status").textContent = "Defaults restored.";
    });
});

// ------------------------
// Initial load
// ------------------------
fetchForecast(locationSelect.value);

</script>

{% endblock %}
