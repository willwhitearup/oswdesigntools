<style>

.onshape-container {
    display: flex;
    gap: 20px;
    margin: 16px 0;
    align-items: flex-start;
}

.onshape-form-container {
    flex: 0 0 180px;
    background: #f6f7f9;
    padding: 12px;
    border-radius: 8px;
}

.onshape-viewer-wrapper {
    flex: 1;
    min-width: 0;
}

.onshape-info-banner {
    display: flex;
    align-items: center;
    gap: 8px;

    margin: 16px 0;
    padding: 10px 14px;

    background: #eef6ff;
    border-left: 4px solid #0a84ff;
    border-radius: 4px;

    font-size: 14px;
}

.onshape-info-icon {
    color: #0a84ff;
    font-size: 18px;
}

.onshape-form-group {
    margin-bottom: 16px;
}

.onshape-form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
}

.onshape-form-group input[type="text"],
.onshape-form-group select {
    width: 100%;
    box-sizing: border-box;

    padding: 8px 10px;

    border: 1px solid #ccc;
    border-radius: 4px;

    font-size: 14px;
}

.onshape-form-group input[type="range"] {
    width: 100%;
    margin-top: 6px;
}

.onshape-open-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px 18px;

    background: #0a84ff;
    color: #fff;

    border: 0;
    border-radius: 6px;

    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

@media (max-width: 900px) {

    .onshape-container {
        flex-direction: column;
    }

    .onshape-form-container {
        width: 100%;
        flex: none;
    }

}

</style>
